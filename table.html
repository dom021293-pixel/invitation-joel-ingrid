<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Votre numéro de table</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f97316 0%, #2e7d32 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 48px;
            padding: 40px 28px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 70px;
            margin-bottom: 20px;
        }
        h1 {
            color: #f97316;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .nom {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2e7d32;
            margin: 20px 0;
            padding: 15px;
            background: #f1f8e9;
            border-radius: 60px;
        }
        .table-number {
            font-size: 4rem;
            font-weight: 800;
            color: #f97316;
            background: #fff3e0;
            padding: 20px;
            border-radius: 60px;
            margin: 20px 0;
            letter-spacing: 4px;
        }
        .message {
            color: #666;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card" id="tableCard">
        <div class="icon">🍽️✨</div>
        <h1>Votre numéro de table</h1>
        <div class="nom" id="nomInvite">---</div>
        <div class="table-number" id="tableNumber">---</div>
        <div class="message">🎉 Nous avons hâte de vous célébrer ! 🎉</div>
        <div class="footer">Joël & Nadège · 6 juin 2026 · CCB Saint Abraham</div>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nom = urlParams.get('nom');
        const table = urlParams.get('table');
        
        if(nom && table) {
            document.getElementById('nomInvite').innerHTML = decodeURIComponent(nom);
            document.getElementById('tableNumber').innerHTML = table;
        } else {
            document.getElementById('nomInvite').innerHTML = "Invité";
            document.getElementById('tableNumber').innerHTML = "???";
        }
    </script>
</body>
</html>
